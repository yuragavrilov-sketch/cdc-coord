<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DBZ Coordinator</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 24px; color: #1f2937; }
      h1 { margin: 0 0 16px; }
      .status-grid { display: grid; grid-template-columns: repeat(6, minmax(120px, 1fr)); gap: 10px; margin-bottom: 20px; }
      .card { border: 1px solid #d1d5db; border-radius: 8px; padding: 12px; background: #f9fafb; }
      .name { font-size: 12px; color: #6b7280; text-transform: uppercase; }
      .value { margin-top: 6px; font-weight: 700; }
      .message { margin-top: 6px; font-size: 12px; color: #4b5563; min-height: 30px; white-space: pre-wrap; }
      .up { color: #166534; }
      .down { color: #991b1b; }
      .unknown { color: #92400e; }
      table { width: 100%; border-collapse: collapse; }
      th, td { text-align: left; padding: 10px; border-bottom: 1px solid #e5e7eb; }
      th { font-size: 12px; color: #6b7280; text-transform: uppercase; }
      .muted { color: #6b7280; }
      .error { color: #991b1b; margin-bottom: 12px; }
      @media (max-width: 900px) { .status-grid { grid-template-columns: repeat(2, minmax(120px, 1fr)); } }

      /* Clickable rows */
      tbody tr.data-row { cursor: pointer; transition: background 0.1s; }
      tbody tr.data-row:hover { background: #f3f4f6; }
      tbody tr.data-row.expanded { background: #eff6ff; }
      tbody tr.data-row.expanded:hover { background: #dbeafe; }

      /* Expand indicator */
      .expand-icon { display: inline-block; transition: transform .2s; font-size: 11px; margin-right: 4px; color: #6b7280; }
      tr.expanded .expand-icon { transform: rotate(90deg); }

      /* Expanded accordion row */
      tr.accordion-row td { padding: 0; background: #f8fafc; border-bottom: 2px solid #c7d2fe; }
      .accordion-content { padding: 16px 20px; }

      /* Job cards inside accordion */
      .jobs-grid { display: flex; flex-direction: column; gap: 12px; }
      .job-card {
        border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px;
        background: #fff;
      }
      .job-card-header {
        display: flex; align-items: center; gap: 10px;
        margin-bottom: 10px; flex-wrap: wrap;
      }
      .job-card-title { font-weight: 600; font-size: 14px; }
      .job-card-subtitle { font-size: 12px; color: #6b7280; }
      .job-card-header-actions { margin-left: auto; }

      /* Multi-select checkboxes */
      .multiselect-box {
        border: 1px solid #d1d5db; border-radius: 6px;
        max-height: 160px; overflow-y: auto; background: #fff;
      }
      .multiselect-item {
        display: flex; align-items: center; gap: 8px;
        padding: 6px 10px; cursor: pointer; font-size: 13px; font-weight: 400;
        transition: background .1s;
      }
      .multiselect-item:hover { background: #f3f4f6; }
      .multiselect-item input[type=checkbox] { cursor: pointer; margin: 0; }
      .multiselect-item-disabled { opacity: 0.45; cursor: not-allowed; }
      .multiselect-item-disabled:hover { background: transparent; }
      .multiselect-item-disabled input[type=checkbox] { cursor: not-allowed; }
      .pk-notice {
        font-size: 12px; margin-top: 6px; padding: 6px 10px;
        background: #d1fae5; color: #065f46; border-radius: 6px;
      }
      .no-pk-notice {
        font-size: 12px; margin-top: 6px; padding: 6px 10px;
        background: #fef3c7; color: #92400e; border-radius: 6px;
      }
      .cols-loading { font-size: 13px; color: #6b7280; padding: 8px 10px; }

      /* Status badges */
      .badge {
        display: inline-block; padding: 2px 8px; border-radius: 12px;
        font-size: 12px; font-weight: 600;
      }
      .badge-none    { background: #f3f4f6; color: #6b7280; }
      .badge-running { background: #dbeafe; color: #1d4ed8; }
      .badge-done    { background: #d1fae5; color: #065f46; }
      .badge-error   { background: #fee2e2; color: #991b1b; }
      .badge-other   { background: #fef3c7; color: #92400e; }

      /* Overlay (shared) */
      .overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,.35);
        z-index: 100; opacity: 0; pointer-events: none;
        transition: opacity .2s;
      }
      .overlay.visible { opacity: 1; pointer-events: all; }

      /* Modal dialog */
      .modal {
        position: fixed; inset: 0; z-index: 102;
        display: flex; align-items: center; justify-content: center;
        pointer-events: none; opacity: 0; transition: opacity .18s;
      }
      .modal.visible { opacity: 1; pointer-events: all; }
      .modal-box {
        background: #fff; border-radius: 10px;
        box-shadow: 0 8px 40px rgba(0,0,0,.18);
        width: 500px; max-width: calc(100vw - 32px);
        max-height: calc(100vh - 48px);
        display: flex; flex-direction: column;
        transform: scale(.96); transition: transform .18s;
      }
      .modal.visible .modal-box { transform: scale(1); }
      .modal-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 16px 20px; border-bottom: 1px solid #e5e7eb; flex-shrink: 0;
      }
      .modal-header h2 { margin: 0; font-size: 16px; }
      .modal-body { padding: 20px; overflow-y: auto; flex: 1; }

      /* Side panel (create-job from row click) */
      .side-panel {
        position: fixed; top: 0; right: 0; bottom: 0;
        width: 440px; max-width: 100vw;
        background: #fff; box-shadow: -4px 0 24px rgba(0,0,0,.12);
        z-index: 101; display: flex; flex-direction: column;
        transform: translateX(100%); transition: transform .22s ease;
      }
      .side-panel.visible { transform: translateX(0); }

      .panel-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 16px 20px; border-bottom: 1px solid #e5e7eb;
        flex-shrink: 0;
      }
      .panel-header h2 { margin: 0; font-size: 16px; }
      .btn-close {
        background: none; border: none; cursor: pointer;
        font-size: 20px; color: #6b7280; line-height: 1; padding: 2px 6px;
      }
      .btn-close:hover { color: #111; }
      .panel-body { padding: 20px; overflow-y: auto; flex: 1; }

      /* Create-job form */
      .form-group { margin-bottom: 16px; }
      .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #374151; }
      .form-group input[type=text], .form-group select {
        width: 100%; box-sizing: border-box;
        border: 1px solid #d1d5db; border-radius: 6px;
        padding: 8px 10px; font-size: 14px; color: #1f2937;
      }
      .form-group input[readonly] { background: #f9fafb; color: #6b7280; }
      .radio-group { display: flex; gap: 16px; margin-top: 4px; flex-wrap: wrap; }
      .radio-group label { font-weight: 400; display: flex; align-items: center; gap: 6px; cursor: pointer; }
      .hint { font-weight: 400; color: #9ca3af; font-size: 12px; }
      .form-error { color: #991b1b; font-size: 13px; margin-bottom: 12px; padding: 8px 10px; background: #fee2e2; border-radius: 6px; white-space: pre-wrap; font-family: monospace; }
      .form-success { color: #065f46; font-size: 13px; margin-bottom: 12px; padding: 8px 10px; background: #d1fae5; border-radius: 6px; }
      .btn-primary {
        display: block; width: 100%; padding: 10px;
        background: #1d4ed8; color: #fff; border: none; border-radius: 6px;
        font-size: 14px; font-weight: 600; cursor: pointer;
      }
      .btn-primary:hover { background: #1e40af; }
      .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }
      .btn-danger {
        padding: 6px 14px;
        background: #fff; color: #991b1b; border: 1px solid #fca5a5; border-radius: 6px;
        font-size: 13px; font-weight: 600; cursor: pointer;
      }
      .btn-danger:hover { background: #fee2e2; }
      .btn-danger:disabled { opacity: .5; cursor: not-allowed; }
      .warn-box { padding: 10px 12px; background: #fef3c7; color: #92400e; border-radius: 6px; font-size: 13px; margin-top: 8px; white-space: pre-wrap; }

      /* Detail table inside job card */
      .detail-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 10px; }
      .detail-table tr { border-bottom: 1px solid #f3f4f6; }
      .detail-table td { padding: 6px 4px; vertical-align: top; }
      .detail-table td:first-child { color: #6b7280; width: 40%; font-weight: 500; white-space: nowrap; }
      .detail-table td:last-child { word-break: break-all; }
      .section-title { font-size: 11px; text-transform: uppercase; color: #9ca3af; font-weight: 600; margin: 12px 0 6px; letter-spacing: .05em; }
      .loading { color: #6b7280; font-size: 14px; text-align: center; padding: 20px 0; }

      /* Chunks table inside accordion */
      .chunks-summary { font-size: 12px; color: #4b5563; margin-bottom: 6px; display: flex; flex-wrap: wrap; gap: 12px; }
      .chunks-summary span { white-space: nowrap; }
      .chunks-wrap { max-height: 300px; overflow-y: auto; border: 1px solid #e5e7eb; border-radius: 6px; }
      .chunks-table { width: 100%; border-collapse: collapse; font-size: 12px; }
      .chunks-table th { position: sticky; top: 0; background: #f9fafb; padding: 6px 8px; text-align: left; font-size: 11px; color: #6b7280; text-transform: uppercase; border-bottom: 1px solid #e5e7eb; }
      .chunks-table td { padding: 6px 8px; border-bottom: 1px solid #f3f4f6; vertical-align: middle; }
      .chunks-table tr:last-child td { border-bottom: none; }
      /* Chunks sortable headers reuse .sortable/.sort-arrow */
      .chunks-table th.sortable { cursor: pointer; }
      .chunks-table th.sortable:hover { color: #1d4ed8; }

      /* Chunks toolbar (search) */
      .chunks-toolbar { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
      .chunks-search-input {
        flex: 1; border: 1px solid #d1d5db; border-radius: 5px;
        padding: 5px 8px; font-size: 12px; color: #1f2937;
      }

      /* Chunks mini-pagination */
      .chunks-pager { display: flex; align-items: center; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
      .chunks-pager button {
        padding: 3px 8px; border: 1px solid #d1d5db; border-radius: 4px;
        background: #fff; cursor: pointer; font-size: 11px; color: #374151;
      }
      .chunks-pager button:hover:not(:disabled) { background: #f3f4f6; }
      .chunks-pager button:disabled { opacity: .4; cursor: not-allowed; }
      .chunks-pager button.active { background: #1d4ed8; color: #fff; border-color: #1d4ed8; }
      .chunks-pager-info { font-size: 11px; color: #6b7280; margin-left: 2px; }

      /* Form select (shared with modal and panel) */
      .form-group select {
        width: 100%; box-sizing: border-box;
        border: 1px solid #d1d5db; border-radius: 6px;
        padding: 8px 10px; font-size: 14px; color: #1f2937;
        background: #fff;
      }
      .form-group select:disabled { background: #f9fafb; color: #6b7280; }

      /* Progress cell in jobs list */
      .progress-cell { font-size: 12px; color: #4b5563; white-space: nowrap; }
      .progress-cell .speed { color: #1d4ed8; margin-left: 6px; }

      /* Table toolbar */
      .tbl-toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
      .tbl-toolbar h2 { margin: 0; flex-shrink: 0; }
      #tbl-search {
        flex: 1; min-width: 160px; max-width: 320px;
        border: 1px solid #d1d5db; border-radius: 6px;
        padding: 7px 10px; font-size: 14px; color: #1f2937;
      }
      .btn-add-table {
        padding: 7px 16px; background: #1d4ed8; color: #fff;
        border: none; border-radius: 6px; font-size: 14px;
        font-weight: 600; cursor: pointer; white-space: nowrap;
        margin-left: auto;
      }
      .btn-add-table:hover { background: #1e40af; }
      .btn-delete-table {
        background: none; border: none; cursor: pointer;
        font-size: 16px; padding: 2px 6px; border-radius: 4px; opacity: 0.55;
      }
      .btn-delete-table:hover { opacity: 1; background: #fee2e2; }
      .btn-delete-table:disabled { opacity: 0.25; cursor: default; }

      /* Sortable column headers */
      th.sortable { cursor: pointer; user-select: none; white-space: nowrap; }
      th.sortable:hover { color: #1d4ed8; }
      .sort-arrow { margin-left: 4px; font-size: 10px; color: #9ca3af; }
      th.sort-asc .sort-arrow::after  { content: "▲"; color: #1d4ed8; }
      th.sort-desc .sort-arrow::after { content: "▼"; color: #1d4ed8; }
      th.sort-none .sort-arrow::after { content: "↕"; }

      /* Pagination */
      .pagination { display: flex; align-items: center; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
      .pagination button {
        padding: 5px 10px; border: 1px solid #d1d5db; border-radius: 5px;
        background: #fff; cursor: pointer; font-size: 13px; color: #374151;
      }
      .pagination button:hover:not(:disabled) { background: #f3f4f6; }
      .pagination button:disabled { opacity: .4; cursor: not-allowed; }
      .pagination button.active { background: #1d4ed8; color: #fff; border-color: #1d4ed8; }
      .pagination-info { font-size: 12px; color: #6b7280; margin-left: 4px; }
    </style>
  </head>
  <body>
    <h1>Coordinator Dashboard</h1>

    <section class="status-grid">
      {% for item in service_statuses %}
      <div class="card" data-service-key="{{ item.key }}">
        <div class="name">{{ item.name }}</div>
        <div class="value {{ item.status|lower }}">{{ item.status|upper }}</div>
        <div class="message">{{ item.message or "" }}</div>
      </div>
      {% endfor %}
    </section>

    <section>
      <div class="tbl-toolbar">
        <h2>Таблицы / Jobs</h2>
        <input type="text" id="tbl-search" placeholder="Поиск по таблице…" autocomplete="off">
        <button class="btn-add-table" id="btn-add-table">+ Добавить таблицу</button>
      </div>
      <div id="tbl-error" class="error" style="display:none"></div>

      <table id="main-table">
        <thead>
          <tr>
            <th class="sortable sort-none" data-col="table_name">Source Table <span class="sort-arrow"></span></th>
            <th>Target Table</th>
            <th class="sortable sort-none" data-col="migration_mode">Mode <span class="sort-arrow"></span></th>
            <th class="sortable sort-none" data-col="status">Status <span class="sort-arrow"></span></th>
            <th>Прогресс</th>
            <th>Job ID</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbl-body">
          <tr><td colspan="7" class="loading">Загрузка…</td></tr>
        </tbody>
      </table>

      <div class="pagination" id="tbl-pagination"></div>
    </section>

    <!-- Shared overlay -->
    <div id="overlay" class="overlay"></div>

    <!-- Modal: add new table -->
    <div id="add-table-modal" class="modal" role="dialog" aria-modal="true">
      <div class="modal-box">
        <div class="modal-header">
          <h2>Добавить таблицу для миграции</h2>
          <button class="btn-close" id="modal-close" title="Закрыть">&#x2715;</button>
        </div>
        <div class="modal-body" id="modal-body"></div>
      </div>
    </div>

    <!-- Side panel (create-job from row click) -->
    <div id="side-panel" class="side-panel" role="dialog" aria-modal="true">
      <div class="panel-header">
        <h2 id="panel-title"></h2>
        <button class="btn-close" id="panel-close" title="Закрыть">&#x2715;</button>
      </div>
      <div class="panel-body" id="panel-body"></div>
    </div>

    <script>
      (function () {
        /* ─── Constants ─── */
        const POLL_INTERVAL_MS = 5000;
        const STATUS_CLASSES = ["up", "down", "unknown", "degraded"];
        const NOT_MIGRATED = "не мигрирована";

        /* ─── Utilities ─── */
        function escHtml(str) {
          return String(str)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
        }

        function fmtDate(val) {
          if (!val) return null;
          try { return new Date(val).toLocaleString("ru-RU"); } catch { return String(val); }
        }

        function formatSpeed(rps) {
          if (!rps && rps !== 0) return "—";
          if (rps >= 1000) return (rps / 1000).toFixed(1) + "k rows/s";
          return rps.toFixed(0) + " rows/s";
        }

        async function fetchJson(url, options) {
          const method = (options && options.method) || "GET";
          const response = await fetch(url, {
            method: method,
            headers: { "Accept": "application/json" },
            cache: "no-store",
          });
          if (!response.ok) throw new Error("HTTP " + response.status + " for " + url);
          return response.json();
        }

        function buildErrorMessage(data) {
          let msg = data.message || data.error || "Unknown error";
          if (data.details && typeof data.details === "object" && Object.keys(data.details).length > 0) {
            msg += "\n" + JSON.stringify(data.details, null, 2);
          }
          return msg;
        }

        /* ─── Service-status polling ─── */
        function normalizeStatus(status) {
          const value = String(status || "unknown").toLowerCase();
          return STATUS_CLASSES.includes(value) ? value : "unknown";
        }

        function setStatus(serviceKey, payload) {
          const card = document.querySelector('[data-service-key="' + serviceKey + '"]');
          if (!card) return;
          const valueEl = card.querySelector(".value");
          if (!valueEl) return;
          const messageEl = card.querySelector(".message");
          const normalized = normalizeStatus(payload && payload.status);
          valueEl.classList.remove(...STATUS_CLASSES);
          valueEl.classList.add(normalized);
          valueEl.textContent = normalized.toUpperCase();
          if (messageEl) {
            messageEl.textContent = payload && payload.message ? String(payload.message) : "";
          }
        }

        function mapStatuses(systemStatus, srcConnection, dstConnection, stateConnection, kafkaConnection, connectConnection) {
          const services = systemStatus && systemStatus.services ? systemStatus.services : {};
          return {
            src_db:       srcConnection     || services.src_db       || { status: "unknown" },
            dst_db:       dstConnection     || services.dst_db       || { status: "unknown" },
            statedb:      stateConnection   || services.statedb      || { status: "unknown" },
            kafka:        kafkaConnection   || services.kafka        || { status: "unknown" },
            kafkaconnect: connectConnection || services.kafka_connect || { status: "unknown" },
          };
        }

        async function refreshStatuses() {
          try {
            const [systemStatus, srcConn, dstConn, stateConn, kafkaConn, connectConn] = await Promise.all([
              fetchJson("/api/system-status"),
              fetchJson("/api/connections/src-db"),
              fetchJson("/api/connections/dst-db"),
              fetchJson("/api/connections/statedb"),
              fetchJson("/api/connections/kafka"),
              fetchJson("/api/connections/kafka-connect"),
            ]);
            const next = mapStatuses(systemStatus, srcConn, dstConn, stateConn, kafkaConn, connectConn);
            Object.entries(next).forEach(([key, payload]) => setStatus(key, payload));
          } catch (err) {
            console.warn("[dashboard] failed to refresh statuses", err);
          }
        }

        refreshStatuses();
        setInterval(refreshStatuses, POLL_INTERVAL_MS);

        /* ─── Modal (add new table) ─── */
        const addTableModal = document.getElementById("add-table-modal");
        const modalBody     = document.getElementById("modal-body");
        const modalClose    = document.getElementById("modal-close");

        function openModal(html) {
          modalBody.innerHTML = html;
          document.getElementById("overlay").classList.add("visible");
          addTableModal.classList.add("visible");
        }

        function closeModal() {
          document.getElementById("overlay").classList.remove("visible");
          addTableModal.classList.remove("visible");
        }

        modalClose.addEventListener("click", closeModal);

        /* ─── Side panel (create-job from row click) ─── */
        const overlay   = document.getElementById("overlay");
        const sidePanel = document.getElementById("side-panel");
        const panelTitle = document.getElementById("panel-title");
        const panelBody  = document.getElementById("panel-body");
        const panelClose = document.getElementById("panel-close");

        function openPanel(title, html) {
          panelTitle.textContent = title;
          panelBody.innerHTML = html;
          overlay.classList.add("visible");
          sidePanel.classList.add("visible");
        }

        function closePanel() {
          overlay.classList.remove("visible");
          sidePanel.classList.remove("visible");
        }

        panelClose.addEventListener("click", closePanel);
        overlay.addEventListener("click", function () {
          closePanel();
          closeModal();
        });
        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape") { closePanel(); closeModal(); }
        });

        /* ─── Create-job panel ─── */
        function renderCreateJobForm(sourceTable, editableSource) {
          const srcField = editableSource
            ? `<select id="f-source"><option value="">— Загрузка таблиц источника… —</option></select>`
            : `<input type="text" id="f-source" value="${escHtml(sourceTable)}" readonly>`;
          const tgtField = editableSource
            ? `<select id="f-target"><option value="">— Загрузка таблиц приёмника… —</option></select>`
            : `<input type="text" id="f-target" value="${escHtml(sourceTable)}">`;
          const colsHint = editableSource
            ? "Выберите Source Table выше"
            : "Загрузка колонок…";
          return `
            <form id="create-job-form" autocomplete="off">
              <div class="form-group">
                <label>Source Table</label>
                ${srcField}
              </div>
              <div class="form-group">
                <label>Target Table</label>
                ${tgtField}
              </div>
              <div class="form-group">
                <label>Migration Mode</label>
                <div class="radio-group">
                  <label><input type="radio" name="mode" value="cdc" checked> CDC (live data)</label>
                  <label><input type="radio" name="mode" value="static"> STATIC (archived)</label>
                  <label><input type="radio" name="mode" value="hybrid"> HYBRID (recent CDC + background static)</label>
                </div>
              </div>
              <div id="recent-rows-group" class="form-group" style="display:none">
                <label>Recent Rows <span class="hint">— строк для CDC-фазы (остальные → background static)</span></label>
                <input type="text" id="f-recent-rows" placeholder="2000000">
              </div>
              <div class="form-group">
                <label>Message Key Columns <span class="hint">— необязательно, если есть PK</span></label>
                <div id="cols-loading" class="cols-loading">${colsHint}</div>
                <div id="cols-multiselect" style="display:none">
                  <div class="multiselect-box" id="cols-checkboxes"></div>
                  <div id="pk-notice" style="display:none"></div>
                </div>
              </div>
              <div id="form-msg" class="form-error" style="display:none"></div>
              <button type="submit" class="btn-primary" id="f-submit">Create Job</button>
            </form>
          `;
        }

        async function loadColumns(sourceTable) {
          const loadingEl    = document.getElementById("cols-loading");
          const multiselect  = document.getElementById("cols-multiselect");
          const checkboxesEl = document.getElementById("cols-checkboxes");
          const pkNoticeEl   = document.getElementById("pk-notice");

          try {
            const data = await fetchJson("/api/v1/tables/" + encodeURIComponent(sourceTable) + "/columns");
            const { columns = [], pk_columns = [], not_null_columns = [] } = data;
            const notNullSet = new Set(not_null_columns);

            checkboxesEl.innerHTML = columns.map(col => {
              const isNotNull = notNullSet.has(col);
              if (isNotNull) {
                return `<label class="multiselect-item">
                  <input type="checkbox" name="key_col" value="${escHtml(col)}">
                  ${escHtml(col)}
                </label>`;
              } else {
                return `<label class="multiselect-item multiselect-item-disabled" title="Нельзя использовать как key column: nullable">
                  <input type="checkbox" name="key_col" value="${escHtml(col)}" disabled>
                  ${escHtml(col)} <span class="hint">(nullable — недоступно)</span>
                </label>`;
              }
            }).join("");

            if (pk_columns.length > 0) {
              pkNoticeEl.className = "pk-notice";
              pkNoticeEl.innerHTML = "PK обнаружен: <strong>" + escHtml(pk_columns.join(", ")) +
                "</strong>. Key Columns необязательны.";
              pkNoticeEl.style.display = "block";
            } else {
              pkNoticeEl.className = "no-pk-notice";
              pkNoticeEl.textContent = "PK не обнаружен. Для CDC необходимо выбрать Key Columns.";
              pkNoticeEl.style.display = "block";
            }

            loadingEl.style.display = "none";
            multiselect.style.display = "block";
          } catch (err) {
            loadingEl.textContent = "Не удалось загрузить колонки: " + String(err.message || err);
          }
        }

        async function populateSelect(sel, tables, preselect) {
          sel.innerHTML = `<option value="">— выберите таблицу —</option>`
            + tables.map(t => `<option value="${escHtml(t)}"${t === preselect ? " selected" : ""}>${escHtml(t)}</option>`).join("");
        }

        function bindCreateJobForm(sourceTable, editableSource) {
          const form = document.getElementById("create-job-form");
          if (!form) return;

          if (editableSource) {
            const srcSel = document.getElementById("f-source");
            const tgtSel = document.getElementById("f-target");

            // Load source and target tables in parallel
            Promise.all([
              fetchJson("/api/v1/source-tables"),
              fetchJson("/api/v1/target-tables"),
            ]).then(function ([srcData, tgtData]) {
              populateSelect(srcSel, srcData.tables || [], sourceTable);
              populateSelect(tgtSel, tgtData.tables || [], sourceTable);
            }).catch(function (err) {
              srcSel.innerHTML = `<option value="">Ошибка загрузки: ${escHtml(String(err.message || err))}</option>`;
            });

            srcSel.addEventListener("change", function () {
              const tbl = srcSel.value;
              // Pre-fill target with same name if unset or matches previous source
              if (tgtSel.value === "" || tgtSel.dataset.autoSet === "1") {
                const opt = Array.from(tgtSel.options).find(o => o.value === tbl);
                if (opt) { tgtSel.value = tbl; tgtSel.dataset.autoSet = "1"; }
              }
              if (tbl) loadColumns(tbl);
            });
            tgtSel.addEventListener("change", function () {
              tgtSel.dataset.autoSet = "";
            });
          } else {
            loadColumns(sourceTable);
          }

          // Toggle recent-rows field visibility for hybrid mode
          form.querySelectorAll("input[name=mode]").forEach(function (radio) {
            radio.addEventListener("change", function () {
              const recentGroup = document.getElementById("recent-rows-group");
              if (recentGroup) recentGroup.style.display = radio.value === "hybrid" ? "block" : "none";
            });
          });

          form.addEventListener("submit", async function (e) {
            e.preventDefault();
            const msgEl  = document.getElementById("form-msg");
            const btn    = document.getElementById("f-submit");
            // Always read from the input (supports editable source)
            const source = document.getElementById("f-source").value.trim();
            const target = document.getElementById("f-target").value.trim();
            const mode   = form.querySelector("input[name=mode]:checked").value;
            const recentRowsVal = document.getElementById("f-recent-rows") ? document.getElementById("f-recent-rows").value.trim() : "";

            const keyColumns = Array.from(
              form.querySelectorAll("input[name=key_col]:checked")
            ).map(cb => cb.value);

            if (!source) {
              msgEl.className = "form-error";
              msgEl.textContent = "Выберите Source Table";
              msgEl.style.display = "block";
              return;
            }

            msgEl.style.display = "none";
            btn.disabled = true;
            btn.textContent = "Creating…";

            const body = {
              table_name: source,
              target_table_name: target || undefined,
              migration_mode: mode,
              message_key_columns: keyColumns.length ? keyColumns : null,
            };
            if (mode === "hybrid" && recentRowsVal) {
              body.recent_rows = parseInt(recentRowsVal, 10);
            }

            try {
              const resp = await fetch("/api/v1/jobs", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body),
              });
              const data = await resp.json();
              if (!resp.ok) {
                throw new Error(buildErrorMessage(data));
              }
              msgEl.className = "form-success";
              msgEl.textContent = "Job создан: " + (data.job_id || "OK");
              msgEl.style.display = "block";
              btn.textContent = "Done";
              setTimeout(function () { location.reload(); }, 1200);
            } catch (err) {
              msgEl.className = "form-error";
              msgEl.textContent = String(err.message || err);
              msgEl.style.display = "block";
              btn.disabled = false;
              btn.textContent = "Create Job";
            }
          });
        }

        /* ─── Badge helpers ─── */
        function statusBadgeHtml(status) {
          let cls = "badge-other";
          if (!status || status === NOT_MIGRATED) cls = "badge-none";
          else if (status === "completed")  cls = "badge-done";
          else if (["bulk_running","cdc_accumulating","cdc_catchup","cdc_streaming","bulk_done","pending"].includes(status)) cls = "badge-running";
          else if (["failed","error"].includes(status)) cls = "badge-error";
          return `<span class="badge ${cls}">${escHtml(status || "—")}</span>`;
        }

        function chunkBadgeHtml(status) {
          let cls = "badge-other";
          if (status === "completed")            cls = "badge-done";
          else if (status === "pending")         cls = "badge-none";
          else if (status === "running")         cls = "badge-running";
          else if (status === "failed" || status === "error") cls = "badge-error";
          return `<span class="badge ${cls}">${escHtml(status || "—")}</span>`;
        }

        function detailRow(label, value) {
          const val = (value == null || value === "")
            ? '<span class="muted">—</span>'
            : escHtml(String(value));
          return `<tr><td>${escHtml(label)}</td><td>${val}</td></tr>`;
        }

        /* ─── Chunks table renderer ─── */
        function renderChunksSection(chunksData) {
          const stats  = chunksData.stats  || chunksData._chunk_stats || {};
          const chunks = chunksData.chunks || [];

          let html = `<div class="section-title">Чанки</div>`;

          if (chunks.length === 0) {
            const byStatus = stats.by_status || {};
            const total = stats.total || 0;
            if (total === 0) {
              html += `<p class="muted" style="font-size:13px;">Чанки не созданы</p>`;
              return html;
            }
          }

          const by = stats.by_status || {};
          const done    = by.completed || 0;
          const running = by.running   || 0;
          const failed  = by.failed    || by.error || 0;
          const total   = stats.total  || chunks.length;
          const rows    = (stats.rows_processed || 0).toLocaleString("ru-RU");
          const speed   = stats.avg_rows_per_second != null ? formatSpeed(stats.avg_rows_per_second) : "—";

          html += `<div class="chunks-summary">
            <span>Всего: <strong>${total}</strong></span>
            <span>Выполнено: <strong>${done}</strong></span>
            <span>Выполняется: <strong>${running}</strong></span>
            ${failed ? `<span style="color:#991b1b">Ошибки: <strong>${failed}</strong></span>` : ""}
            <span>Строк: <strong>${rows}</strong></span>
            <span>Ср. скорость: <strong>${speed}</strong></span>
          </div>`;

          if (chunks.length === 0) return html;

          html += `<div class="chunks-wrap"><table class="chunks-table">
            <thead><tr>
              <th>#</th>
              <th>Статус</th>
              <th>Воркер</th>
              <th>Строк</th>
              <th>Скорость</th>
              <th>Завершение</th>
            </tr></thead><tbody>`;

          chunks.forEach(function (c, i) {
            const worker = c.assigned_worker_id
              ? escHtml(String(c.assigned_worker_id).slice(-12))
              : '<span class="muted">—</span>';
            const spd = c.rows_per_second != null ? formatSpeed(c.rows_per_second) : "—";
            const fin = c.completed_at ? escHtml(fmtDate(c.completed_at) || "—") : "—";
            html += `<tr>
              <td class="muted">${i + 1}</td>
              <td>${chunkBadgeHtml(c.status)}</td>
              <td class="muted" style="font-size:11px;">${worker}</td>
              <td>${(c.rows_processed || 0).toLocaleString("ru-RU")}</td>
              <td>${spd}</td>
              <td class="muted" style="font-size:11px;">${fin}</td>
            </tr>`;
            if (c.error_message) {
              html += `<tr><td colspan="6" style="color:#991b1b;font-size:11px;padding:2px 8px 6px;">${escHtml(c.error_message)}</td></tr>`;
            }
          });

          html += `</tbody></table></div>`;
          return html;
        }

        /* ─── Job card renderer ─── */
        function renderJobCard(job, index, total) {
          const isCdc = job.migration_mode === "cdc";
          const isChild = !!job.parent_job_id;

          let cardLabel = isCdc ? "CDC" : "Static";
          if (isChild) cardLabel += " (background)";
          if (total > 1) cardLabel = (index === 0 ? "Основной — " : "Дочерний — ") + cardLabel;

          let html = `<div class="job-card" data-job-id="${escHtml(job.job_id)}">`;
          html += `<div class="job-card-header">`;
          html += `<span class="job-card-title">${escHtml(cardLabel)}</span>`;
          html += statusBadgeHtml(job.status);
          html += `<span class="job-card-subtitle">${escHtml(job.job_id)}</span>`;
          html += `</div>`;

          html += `<table class="detail-table">`;
          html += detailRow("Mode",         job.migration_mode);
          html += detailRow("Source table", job.table_name);
          html += detailRow("Target table", job.target_table_name);
          html += detailRow("Created at",   fmtDate(job.created_at));
          html += detailRow("Completed at", fmtDate(job.completed_at));

          if (isCdc) {
            html += `<tr><td colspan="2" class="section-title">CDC</td></tr>`;
            html += detailRow("SCN cutoff",       job.scn_cutoff);
            html += detailRow("Catchup target",   job.catchup_target);
            html += detailRow("Connector name",   job.debezium_connector_name);
            html += detailRow("Kafka topic",      job.kafka_topic_name);
            html += detailRow("Consumer group",   job.consumer_group_name);
            html += detailRow("CDC owner worker", job.cdc_owner_worker_id);
            html += detailRow("CDC started at",   fmtDate(job.cdc_started_at));
            html += detailRow("CDC heartbeat",    fmtDate(job.cdc_heartbeat_at));
          }

          if (job.message_key_columns && job.message_key_columns.length) {
            html += detailRow("Key columns", job.message_key_columns.join(", "));
          }

          html += `</table>`;

          // Chunk stats (from _chunk_stats embedded in table jobs response)
          if (job._chunk_stats) {
            html += renderChunksSection({ stats: job._chunk_stats, chunks: [] });
            // Add link to load full chunk list
            html += `<a href="#" class="load-chunks-link" data-job-id="${escHtml(job.job_id)}" style="font-size:12px;color:#1d4ed8;">Показать все чанки…</a>`;
            html += `<div class="chunks-detail" data-job-id="${escHtml(job.job_id)}" style="display:none;margin-top:8px;"></div>`;
          }

          html += `</div>`;  // .job-card
          return html;
        }

        /* ─── Accordion (inline expansion) ─── */
        const expandedRows = new Map();  // sourceTable → accordion <tr>

        function getAccordionRow(dataRow) {
          const sourceTable = dataRow.dataset.sourceTable;
          return expandedRows.get(sourceTable) || null;
        }

        function removeAccordionRow(dataRow) {
          const sourceTable = dataRow.dataset.sourceTable;
          const existing = expandedRows.get(sourceTable);
          if (existing) {
            existing.remove();
            expandedRows.delete(sourceTable);
          }
          dataRow.classList.remove("expanded");
        }

        async function openAccordion(dataRow) {
          const sourceTable = dataRow.dataset.sourceTable;

          // If already expanded, collapse
          if (getAccordionRow(dataRow)) {
            removeAccordionRow(dataRow);
            return;
          }

          // Insert accordion row
          const accordionTr = document.createElement("tr");
          accordionTr.className = "accordion-row";
          const td = document.createElement("td");
          td.colSpan = 7;
          td.innerHTML = `<div class="accordion-content"><div class="loading">Загрузка данных о jobs…</div></div>`;
          accordionTr.appendChild(td);
          dataRow.after(accordionTr);
          expandedRows.set(sourceTable, accordionTr);
          dataRow.classList.add("expanded");

          try {
            const data = await fetchJson("/api/v1/tables/" + encodeURIComponent(sourceTable) + "/jobs");
            const jobs = data.items || [];

            if (jobs.length === 0) {
              td.querySelector(".accordion-content").innerHTML = `<p class="muted">Нет jobs для этой таблицы</p>`;
              return;
            }

            let html = `<div class="jobs-grid">`;
            jobs.forEach(function (job, idx) {
              html += renderJobCard(job, idx, jobs.length);
            });
            html += `</div>`;
            td.querySelector(".accordion-content").innerHTML = html;

            // Bind "show chunks" toggle links
            accordionTr.querySelectorAll(".load-chunks-link").forEach(function (link) {
              link.addEventListener("click", function (e) {
                e.preventDefault();
                e.stopPropagation();
                const jobId    = link.dataset.jobId;
                const detailDiv = accordionTr.querySelector(`.chunks-detail[data-job-id="${jobId}"]`);
                if (!detailDiv) return;
                if (detailDiv.style.display !== "none") {
                  detailDiv.style.display = "none";
                  link.textContent = "Показать чанки…";
                } else {
                  detailDiv.style.display = "block";
                  link.textContent = "Скрыть чанки";
                  if (!detailDiv.dataset.initialized) {
                    detailDiv.dataset.initialized = "1";
                    initChunkSection(jobId, detailDiv);
                  }
                }
              });
            });

          } catch (err) {
            td.querySelector(".accordion-content").innerHTML =
              `<p style="color:#991b1b;">Не удалось загрузить jobs: ${escHtml(String(err.message || err))}</p>`;
          }
        }

        /* ─── Chunks section (paginated / sortable / searchable) ─── */
        function initChunkSection(jobId, container) {
          const cs = { search: "", sort: "assigned_at", order: "asc", page: 1, per_page: 50 };

          async function reload() {
            container.querySelector(".chunks-panel-body") &&
              (container.querySelector(".chunks-panel-body").innerHTML =
                `<tr><td colspan="6" class="loading" style="text-align:center;padding:12px;">Загрузка…</td></tr>`);

            const params = new URLSearchParams({
              search: cs.search, sort: cs.sort, order: cs.order,
              page: cs.page, per_page: cs.per_page,
            });
            let data;
            try {
              data = await fetchJson("/api/v1/jobs/" + encodeURIComponent(jobId) + "/chunks?" + params);
            } catch (err) {
              container.innerHTML =
                `<p style="color:#991b1b;font-size:12px;padding:6px 0;">Ошибка: ${escHtml(String(err.message || err))}</p>`;
              return;
            }

            if (!container.querySelector(".chunks-panel-body")) {
              // First render — build full skeleton
              container.innerHTML = renderChunksPanelShell(cs);
            }

            renderChunksPanelBody(container, data, cs);
            bindChunkPanel(container, cs, reload);
          }

          reload();
        }

        function chunkSortHeader(label, col, cs) {
          const active = cs.sort === col;
          const cls    = active ? (cs.order === "asc" ? "sort-asc" : "sort-desc") : "sort-none";
          return `<th class="sortable ${cls}" data-col="${col}">${escHtml(label)} <span class="sort-arrow"></span></th>`;
        }

        function chunksTheadHtml(cs) {
          return `<tr>
            <th style="width:36px;">#</th>
            ${chunkSortHeader("Статус", "status", cs)}
            ${chunkSortHeader("Воркер", "assigned_worker_id", cs)}
            ${chunkSortHeader("Строк", "rows_processed", cs)}
            <th>Скорость</th>
            ${chunkSortHeader("Завершение", "completed_at", cs)}
            <th>Ошибка</th>
          </tr>`;
        }

        function renderChunksPanelShell(cs) {
          return `
            <div class="chunks-toolbar">
              <input class="chunks-search-input" type="text" placeholder="Поиск по статусу, воркеру, ошибке…" value="${escHtml(cs.search)}">
            </div>
            <div class="chunks-wrap">
              <table class="chunks-table">
                <thead class="chunks-thead">${chunksTheadHtml(cs)}</thead>
                <tbody class="chunks-panel-body"></tbody>
              </table>
            </div>
            <div class="chunks-pager"></div>
          `;
        }

        function renderChunksPanelBody(container, data, cs) {
          const chunks  = data.chunks  || [];
          const total   = data.total   || 0;
          const pages   = data.pages   || 1;
          const page    = data.page    || cs.page;
          const perPage = data.per_page || cs.per_page;

          // Rebuild sort headers (direction may have changed)
          const thead = container.querySelector(".chunks-thead");
          if (thead) thead.innerHTML = chunksTheadHtml(cs);

          const tbody = container.querySelector(".chunks-panel-body");
          if (!tbody) return;

          if (chunks.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7" class="muted" style="text-align:center;padding:12px;">
              ${cs.search ? "Нет чанков по запросу «" + escHtml(cs.search) + "»" : "Нет чанков"}
            </td></tr>`;
          } else {
            tbody.innerHTML = chunks.map(function (c, i) {
              const rowNum = (page - 1) * perPage + i + 1;
              const worker = c.assigned_worker_id
                ? escHtml(String(c.assigned_worker_id).slice(-14))
                : '<span class="muted">—</span>';
              const spd = c.rows_per_second != null ? formatSpeed(c.rows_per_second) : "—";
              const fin = c.completed_at ? escHtml(fmtDate(c.completed_at) || "—") : "—";
              const errCell = c.error_message
                ? `<td style="color:#991b1b;font-size:11px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"
                     title="${escHtml(c.error_message)}">${escHtml(c.error_message.length > 60 ? c.error_message.slice(0, 60) + "…" : c.error_message)}</td>`
                : `<td class="muted">—</td>`;
              return `<tr>
                <td class="muted">${rowNum}</td>
                <td>${chunkBadgeHtml(c.status)}</td>
                <td class="muted" style="font-size:11px;">${worker}</td>
                <td>${(c.rows_processed || 0).toLocaleString("ru-RU")}</td>
                <td>${spd}</td>
                <td class="muted" style="font-size:11px;">${fin}</td>
                ${errCell}
              </tr>`;
            }).join("");
          }

          // Pagination
          const pager = container.querySelector(".chunks-pager");
          if (!pager) return;
          if (total <= perPage && pages <= 1) {
            pager.innerHTML = total ? `<span class="chunks-pager-info">Всего: ${total}</span>` : "";
            return;
          }
          const from = (page - 1) * perPage + 1;
          const to   = Math.min(page * perPage, total);
          let ph = `<button class="cpg-prev" ${page <= 1 ? "disabled" : ""}>← Пред.</button>`;
          const maxBtns = 5;
          let sp = Math.max(1, page - Math.floor(maxBtns / 2));
          let ep = Math.min(pages, sp + maxBtns - 1);
          if (ep - sp < maxBtns - 1) sp = Math.max(1, ep - maxBtns + 1);
          if (sp > 1) ph += `<button class="cpg-num" data-page="1">1</button>` + (sp > 2 ? `<span style="padding:0 3px;color:#9ca3af">…</span>` : "");
          for (let p = sp; p <= ep; p++) {
            ph += `<button class="cpg-num${p === page ? " active" : ""}" data-page="${p}">${p}</button>`;
          }
          if (ep < pages) {
            ph += (ep < pages - 1 ? `<span style="padding:0 3px;color:#9ca3af">…</span>` : "") + `<button class="cpg-num" data-page="${pages}">${pages}</button>`;
          }
          ph += `<button class="cpg-next" ${page >= pages ? "disabled" : ""}>След. →</button>`;
          ph += `<span class="chunks-pager-info">${from}–${to} из ${total}</span>`;
          pager.innerHTML = ph;
        }

        function bindChunkPanel(container, cs, reload) {
          // Sort headers
          container.querySelectorAll(".chunks-table th.sortable").forEach(function (th) {
            th.addEventListener("click", function () {
              const col = th.dataset.col;
              if (cs.sort === col) {
                cs.order = cs.order === "asc" ? "desc" : "asc";
              } else {
                cs.sort  = col;
                cs.order = "asc";
              }
              cs.page = 1;
              reload();
            });
          });

          // Search (debounced)
          const searchEl = container.querySelector(".chunks-search-input");
          if (searchEl && !searchEl.dataset.bound) {
            searchEl.dataset.bound = "1";
            let timer;
            searchEl.addEventListener("input", function () {
              clearTimeout(timer);
              timer = setTimeout(function () {
                cs.search = searchEl.value.trim();
                cs.page = 1;
                reload();
              }, 350);
            });
          }

          // Pagination buttons
          const pager = container.querySelector(".chunks-pager");
          if (!pager) return;
          const prevBtn = pager.querySelector(".cpg-prev");
          const nextBtn = pager.querySelector(".cpg-next");
          if (prevBtn) prevBtn.addEventListener("click", function () { if (cs.page > 1) { cs.page--; reload(); } });
          if (nextBtn) nextBtn.addEventListener("click", function () { cs.page++; reload(); });
          pager.querySelectorAll(".cpg-num").forEach(function (btn) {
            btn.addEventListener("click", function () {
              cs.page = parseInt(btn.dataset.page, 10);
              reload();
            });
          });
        }

        /* ─── Row click handler (delegated — body may be re-rendered) ─── */
        document.getElementById("tbl-body").addEventListener("click", async function (e) {
          if (e.target.closest(".accordion-row")) return;

          /* Delete table button */
          const delBtn = e.target.closest(".btn-delete-table");
          if (delBtn) {
            e.stopPropagation();
            const tbl = delBtn.dataset.table;
            if (!confirm(`Удалить таблицу «${tbl}» и все её jobs?\nКоннекторы Debezium будут удалены автоматически.\nДействие необратимо.`)) return;
            delBtn.disabled = true;
            try {
              const result = await fetchJson("/api/v1/tables/" + encodeURIComponent(tbl), { method: "DELETE" });
              if (result.debezium_warnings && result.debezium_warnings.length) {
                alert("⚠ Предупреждения Debezium:\n" + result.debezium_warnings.join("\n\n"));
              }
              loadTable();
            } catch (err) {
              alert("Ошибка удаления: " + String(err.message || err));
              delBtn.disabled = false;
            }
            return;
          }

          const tr = e.target.closest("tr.data-row");
          if (!tr) return;

          const sourceTable = tr.dataset.sourceTable;
          const status      = tr.dataset.status;
          const jobId       = tr.dataset.jobId;

          if (!jobId || jobId === "—") {
            openPanel("Создать Job — " + sourceTable, renderCreateJobForm(sourceTable, false));
            bindCreateJobForm(sourceTable, false);
          } else {
            openAccordion(tr);
          }
        });

        /* ─── "Add table" button ─── */
        document.getElementById("btn-add-table").addEventListener("click", function () {
          openModal(renderCreateJobForm("", true));
          bindCreateJobForm("", true);
        });

        /* ─── Table list (paginated, sortable, searchable) ─── */
        const tblState = { search: "", sort: "table_name", order: "asc", page: 1, per_page: 20 };

        async function loadTable() {
          const body    = document.getElementById("tbl-body");
          const errEl   = document.getElementById("tbl-error");
          const pgEl    = document.getElementById("tbl-pagination");
          body.innerHTML = `<tr><td colspan="7" class="loading">Загрузка…</td></tr>`;
          errEl.style.display = "none";

          const params = new URLSearchParams({
            search:   tblState.search,
            sort:     tblState.sort,
            order:    tblState.order,
            page:     tblState.page,
            per_page: tblState.per_page,
          });

          let data;
          try {
            data = await fetchJson("/api/v1/tables?" + params.toString());
          } catch (err) {
            body.innerHTML = `<tr><td colspan="7" class="muted">Не удалось загрузить таблицы</td></tr>`;
            errEl.textContent = "Ошибка загрузки: " + String(err.message || err);
            errEl.style.display = "block";
            pgEl.innerHTML = "";
            return;
          }

          const items = data.items || [];
          if (items.length === 0) {
            body.innerHTML = `<tr><td colspan="7" class="muted">Нет таблиц${tblState.search ? " по запросу «" + escHtml(tblState.search) + "»" : ""}</td></tr>`;
            pgEl.innerHTML = "";
            renderPagination(data.page, data.pages, data.total, data.per_page);
            return;
          }

          body.innerHTML = items.map(function (item) {
            return `<tr
              class="data-row"
              data-source-table="${escHtml(item.source_table)}"
              data-status="${escHtml(item.status)}"
              data-job-id="${escHtml(item.job_id)}"
            >
              <td><span class="expand-icon">&#9654;</span>${escHtml(item.source_table)}</td>
              <td>${escHtml(item.target_table)}</td>
              <td>${escHtml(item.mode)}</td>
              <td>${statusBadgeHtml(item.status)}</td>
              <td class="progress-cell" id="progress-${escHtml(item.job_id)}"><span class="muted">—</span></td>
              <td class="muted" style="font-size:11px;">${escHtml(item.job_id)}</td>
              <td style="white-space:nowrap;">
                <button class="btn-delete-table" data-table="${escHtml(item.source_table)}" title="Удалить все джобы таблицы">&#x1F5D1;</button>
              </td>
            </tr>`;
          }).join("");

          renderPagination(data.page, data.pages, data.total, data.per_page);
          loadChunkStats(items);
        }

        function renderPagination(page, pages, total, perPage) {
          const pgEl = document.getElementById("tbl-pagination");
          if (pages <= 1 && total <= perPage) {
            pgEl.innerHTML = total
              ? `<span class="pagination-info">Всего: ${total}</span>`
              : "";
            return;
          }
          const from = (page - 1) * perPage + 1;
          const to   = Math.min(page * perPage, total);
          let html = `<button id="pg-prev" ${page <= 1 ? "disabled" : ""}>&#8592; Пред.</button>`;

          const maxButtons = 7;
          let startPage = Math.max(1, page - Math.floor(maxButtons / 2));
          let endPage   = Math.min(pages, startPage + maxButtons - 1);
          if (endPage - startPage < maxButtons - 1) startPage = Math.max(1, endPage - maxButtons + 1);

          if (startPage > 1) html += `<button class="pg-num" data-page="1">1</button>` + (startPage > 2 ? `<span style="padding:0 4px;color:#9ca3af">…</span>` : "");
          for (let p = startPage; p <= endPage; p++) {
            html += `<button class="pg-num${p === page ? " active" : ""}" data-page="${p}">${p}</button>`;
          }
          if (endPage < pages) {
            html += (endPage < pages - 1 ? `<span style="padding:0 4px;color:#9ca3af">…</span>` : "") + `<button class="pg-num" data-page="${pages}">${pages}</button>`;
          }

          html += `<button id="pg-next" ${page >= pages ? "disabled" : ""}>След. &#8594;</button>`;
          html += `<span class="pagination-info">${from}–${to} из ${total}</span>`;
          pgEl.innerHTML = html;

          pgEl.querySelector("#pg-prev") && pgEl.querySelector("#pg-prev").addEventListener("click", function () {
            if (tblState.page > 1) { tblState.page--; loadTable(); }
          });
          pgEl.querySelector("#pg-next") && pgEl.querySelector("#pg-next").addEventListener("click", function () {
            if (tblState.page < pages) { tblState.page++; loadTable(); }
          });
          pgEl.querySelectorAll(".pg-num").forEach(function (btn) {
            btn.addEventListener("click", function () {
              tblState.page = parseInt(btn.dataset.page, 10);
              loadTable();
            });
          });
        }

        async function loadChunkStats(items) {
          const promises = items.map(function (item) {
            const jobId = item.job_id;
            if (!jobId || jobId === "—") return Promise.resolve();
            const cell = document.getElementById("progress-" + jobId);
            if (!cell) return Promise.resolve();
            return fetchJson("/api/v1/jobs/" + encodeURIComponent(jobId) + "/chunks")
              .then(function (data) {
                const stats = data.stats || {};
                const total = stats.total || 0;
                if (total === 0) { cell.innerHTML = '<span class="muted">—</span>'; return; }
                const done = (stats.by_status || {}).completed || 0;
                const spd  = stats.avg_rows_per_second;
                cell.innerHTML = `<strong>${done}</strong> / ${total} чанков`
                  + (spd != null ? `<span class="speed">${formatSpeed(spd)}</span>` : "");
              })
              .catch(function () { cell.innerHTML = '<span class="muted">—</span>'; });
          });
          await Promise.all(promises);
        }

        /* ─── Sort headers ─── */
        document.querySelectorAll("th.sortable").forEach(function (th) {
          th.addEventListener("click", function () {
            const col = th.dataset.col;
            if (tblState.sort === col) {
              tblState.order = tblState.order === "asc" ? "desc" : "asc";
            } else {
              tblState.sort  = col;
              tblState.order = "asc";
            }
            tblState.page = 1;
            document.querySelectorAll("th.sortable").forEach(function (h) {
              h.classList.remove("sort-asc", "sort-desc");
              h.classList.add("sort-none");
            });
            th.classList.remove("sort-none");
            th.classList.add(tblState.order === "asc" ? "sort-asc" : "sort-desc");
            loadTable();
          });
        });

        /* ─── Search (debounced) ─── */
        (function () {
          let timer;
          document.getElementById("tbl-search").addEventListener("input", function (e) {
            clearTimeout(timer);
            timer = setTimeout(function () {
              tblState.search = e.target.value.trim();
              tblState.page = 1;
              loadTable();
            }, 400);
          });
        })();

        /* Initial load */
        loadTable();
      })();
    </script>
  </body>
</html>
